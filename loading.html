<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wino Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500&family=Syncopate&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="loading-screen" aria-label="Loading page">
      <img class="loading-logo" src="./assets/wino_logo_isolated.svg" alt="Wino logo" />
      <p class="loading-text">Loading<span class="loading-dots" aria-hidden="true"></span></p>
    </main>
  </body>
</html>
